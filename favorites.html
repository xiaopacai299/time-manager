<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>收藏夹</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: transparent;
        color: #1f2a44;
      }
      .wrap {
        padding: 14px;
      }
      .drop-zone {
        border: 2px dashed #5f87ff;
        border-radius: 12px;
        min-height: 92px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #4062d6;
        background: rgba(95, 135, 255, 0.08);
        margin-bottom: 12px;
        transition: 120ms ease;
      }
      .drop-zone.dragover {
        background: rgba(95, 135, 255, 0.18);
        transform: scale(1.01);
      }
      .hint {
        font-size: 13px;
        line-height: 1.35;
      }
      .tips {
        margin: 8px 0 10px;
        font-size: 12px;
        color: #6a7aa8;
      }
      .msg {
        min-height: 18px;
        font-size: 12px;
        color: #c14b2f;
        margin-bottom: 8px;
      }
      .list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
        gap: 10px;
      }
      .item {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 10px;
        background: transparent;
        padding: 10px 8px;
        min-height: 94px;
        cursor: default;
      }
      .icon {
        width: 34px;
        height: 34px;
        border-radius: 6px;
        object-fit: contain;
        background: #eef3ff;
      }
      .name {
        font-size: 12px;
        text-align: center;
        line-height: 1.3;
        max-width: 100%;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .empty {
        padding: 18px 10px;
        text-align: center;
        color: #6a7aa8;
        font-size: 13px;
      }
      .context-menu {
        position: fixed;
        z-index: 9999;
        min-width: 110px;
        background: #fff;
        border: 1px solid #d8e2ff;
        border-radius: 8px;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.16);
        overflow: hidden;
      }
      .context-menu button {
        width: 100%;
        border: 0;
        background: #fff;
        text-align: left;
        padding: 8px 10px;
        font-size: 12px;
        color: #243457;
      }
      .context-menu button:hover {
        background: #edf2ff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="dropZone" class="drop-zone">
        <div class="hint">仅支持拖入应用快捷方式（.lnk）</div>
      </div>
      <div class="tips">双击图标打开应用，右键图标可删除。</div>
      <div id="msg" class="msg"></div>
      <div id="list" class="list"></div>
    </div>
    <script>
      const dropZone = document.getElementById('dropZone');
      const listEl = document.getElementById('list');
      const msgEl = document.getElementById('msg');
      const iconCache = new Map();
      let menuEl = null;

      function fallbackIcon() {
        return 'data:image/svg+xml;base64,' + btoa(
          '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"><rect width="24" height="24" rx="6" fill="#dbe6ff"/><path d="M7 8h10v8H7z" fill="#5b7fe8"/></svg>'
        );
      }

      function setMessage(text) {
        msgEl.textContent = text || '';
      }

      function hideContextMenu() {
        if (menuEl) {
          menuEl.remove();
          menuEl = null;
        }
      }

      function showContextMenu(x, y, item) {
        hideContextMenu();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = `${x}px`;
        menu.style.top = `${y}px`;
        const removeBtn = document.createElement('button');
        removeBtn.textContent = '删除';
        removeBtn.onclick = async () => {
          hideContextMenu();
          const list = await window.favoritesAPI.remove(item.path);
          renderList(list || []);
        };
        menu.appendChild(removeBtn);
        document.body.appendChild(menu);
        menuEl = menu;
      }

      function renderList(items) {
        if (!items || items.length === 0) {
          listEl.innerHTML = '<div class="empty">暂无收藏，拖一个应用进来试试</div>';
          return;
        }
        listEl.innerHTML = '';
        for (const item of items) {
          const row = document.createElement('div');
          row.className = 'item';

          const name = document.createElement('div');
          name.className = 'name';
          name.textContent = item.name || item.path;
          name.title = item.path;

          const icon = document.createElement('img');
          icon.className = 'icon';
          icon.alt = '';
          const persistedIcon = typeof item.iconDataUrl === 'string' ? item.iconDataUrl : '';
          const cachedIcon = iconCache.get(item.path) || persistedIcon;
          icon.src = cachedIcon || fallbackIcon();
          if (persistedIcon) {
            iconCache.set(item.path, persistedIcon);
          }
          if (!iconCache.has(item.path)) {
            window.favoritesAPI.getIcon(item.path).then((url) => {
              if (typeof url === 'string' && url.length > 0) {
                iconCache.set(item.path, url);
                icon.src = url;
              }
            });
          }

          row.ondblclick = () => window.favoritesAPI.open(item.path);
          row.oncontextmenu = (event) => {
            event.preventDefault();
            showContextMenu(event.clientX, event.clientY, item);
          };

          row.appendChild(icon);
          row.appendChild(name);
          listEl.appendChild(row);
        }
      }

      function extractDropPaths(event) {
        const files = Array.from(event.dataTransfer?.files || []);
        const uriList = event.dataTransfer?.getData('text/uri-list') || '';
        return window.favoritesAPI.resolveDropPaths(files, uriList);
      }

      dropZone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', async (event) => {
        event.preventDefault();
        dropZone.classList.remove('dragover');
        const paths = extractDropPaths(event);
        if (!paths.length) return;
        const result = await window.favoritesAPI.addPaths(paths, true);
        console.log('拖动后的结果',result)
        renderList(result?.list || []);
        if ((result?.rejected || []).length > 0) {
          setMessage('仅支持拖入应用快捷方式(.lnk)，文件夹/文件已忽略。');
        } else {
          setMessage('');
        }
      });

      window.favoritesAPI.onUpdated((items) => {
        renderList(items || []);
      });

      window.favoritesAPI.getList().then((items) => renderList(items || []));
      window.addEventListener('click', hideContextMenu);
      window.addEventListener('blur', hideContextMenu);
    </script>
  </body>
  </html>
